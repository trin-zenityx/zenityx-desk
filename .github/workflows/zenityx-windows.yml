name: Build ZenityX Desk (Windows)

# Self-contained Windows build for the ZenityX Desk fork.
# Bridge files are committed, so no flutter_rust_bridge codegen step is needed.
# Trigger manually:  gh workflow run zenityx-windows.yml
# Inputs limited to workflow_dispatch + env vars only (no untrusted github.event data).

on:
  workflow_dispatch:

env:
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75.0"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace engine with RustDesk custom flutter engine
        run: |
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          $engineDir = "$env:FLUTTER_ROOT/bin/cache/artifacts/engine/windows-x64-release"
          New-Item -ItemType Directory -Force -Path $engineDir | Out-Null
          mv -Force windows-x64-release/* "$engineDir/"
          Write-Host "engine replaced at $engineDir"

      - name: Patch flutter (dropdown enableFilter)
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff "$(dirname "$(dirname "$(which flutter)")")"
          cd "$(dirname "$(dirname "$(which flutter)")")"
          git apply flutter_3.24.4_dropdown_menu_enableFilter.diff || echo "patch already applied / skipped"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-zenityx

      - name: Setup vcpkg (pinned commit)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies (x64-windows-static)
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          if ! "$VCPKG_ROOT/vcpkg" install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"; then
            find "$VCPKG_ROOT/" -name "*.log" -exec echo "{}:" \; -exec cat {} \;
            exit 1
          fi

      - name: Flutter pub get
        shell: bash
        run: cd flutter && flutter pub get

      - name: Build ZenityX Desk (Windows)
        shell: pwsh
        run: |
          python build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          mv ./flutter/build/windows/x64/runner/Release ./ZenityX-Desk-Windows

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: ZenityX-Desk-Windows-x64
          path: ZenityX-Desk-Windows
          retention-days: 14
